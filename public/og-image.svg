<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">WealthLab - Financial Calculators</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2435;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#22c55e" opacity="0.05" />
  <circle cx="1050" cy="500" r="150" fill="#22c55e" opacity="0.04" />
  <circle cx="100" cy="520" r="180" fill="#22c55e" opacity="0.04" />

  <!-- Logo icon -->
  <rect x="120" y="200" width="60" height="60" rx="12" fill="#22c55e" />
  <polyline points="135,245 150,230 165,238 185,218" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Brand name -->
  <text x="200" y="245" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="52" fill="white">Wealth<tspan fill="#4ade80">Lab</tspan></text>

  <!-- Tagline -->
  <text x="120" y="330" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.65)">Free Financial Calculators for Smart Planning</text>

  <!-- Divider -->
  <rect x="120" y="370" width="80" height="4" rx="2" fill="url(#accent)" />

  <!-- Calculator tags -->
  <rect x="120" y="410" width="100" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="170" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">SIP</text>

  <rect x="238" y="410" width="100" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="288" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">EMI</text>

  <rect x="356" y="410" width="100" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="406" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">FD</text>

  <rect x="474" y="410" width="130" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="539" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">Lumpsum</text>

  <rect x="622" y="410" width="120" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="682" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">CAGR</text>

  <rect x="760" y="410" width="150" height="38" rx="8" fill="rgba(34,197,94,0.15)" />
  <text x="835" y="434" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">Inflation</text>

  <!-- URL -->
  <text x="120" y="560" font-family="Inter, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.40)">devsr.me</text>
</svg>
